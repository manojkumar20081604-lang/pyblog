services:
  - type: web
    name: pyblog
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn blog_app:app --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pyblog-db
          propertyName: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
